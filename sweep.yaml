program: src/train.py

method: random

metric:
  name: val_accuracy
  goal: maximize

parameters:
  dataset:
    value: mnist

  wandb_project:
    value: DL_Assignment1
    
  learning_rate:
    values: [0.0001, 0.001, 0.01]

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop"]

  activation:
    values: ["relu", "sigmoid", "tanh"]

  hidden_size:
    values:
      - 64
      - 128

  batch_size:
    values: [32, 64, 128]

  epochs:
    value: 10